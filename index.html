<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포모도로 타이머</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="window">
    <div class="window-bar">
      <span class="traffic-dot red"></span>
      <span class="traffic-dot yellow"></span>
      <span class="traffic-dot green"></span>
    </div>

    <div class="app">
      <div class="time-section">
        <div id="time-display" class="time-display">25:00</div>
        <div id="mode-label" class="mode-label">집중 시간</div>
      </div>

      <div class="clock-wrap">
        <svg id="clock-svg" class="clock-svg" viewBox="0 0 280 280">
          <circle cx="140" cy="140" r="122" fill="#ebebeb"/>
          <path id="progress-path" fill="#e8716a"/>
          <g id="ticks"></g>
          <g id="tick-numbers"></g>
          <circle cx="140" cy="140" r="32" fill="white"/>
        </svg>
        <button id="center-btn" class="center-btn" onclick="toggleTimer()">▶</button>
      </div>

      <div id="session-dots" class="session-dots"></div>

      <div class="controls">
        <button class="btn" onclick="resetTimer()">리셋</button>
        <button class="btn btn-accent" onclick="switchMode()">모드 전환</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
